# Marina configuration example. Copy to ~/.lotsman/marina.toml and edit.
#
# Two top-level blocks: [hosts.NAME] (manual gRPC endpoints, no provisioning)
# and [seas.NAME] (lifecycle-managed providers — Marina spawns/destroys
# containers or VMs through them).

# --------------------------------------------------------------------------
# Manual hosts: pre-baked Lotsman endpoints Marina just connects to.
# Use this for ssh-tunneled UDS or a long-lived container outside Marina's
# lifecycle.
# --------------------------------------------------------------------------

# [hosts.legacy_box]
# target = "localhost:50051"

# Alias: grpc_target (same field, alternate name)
# [hosts.uds_via_ssh]
# grpc_target = "unix:///tmp/lotsman-w3.sock"


# --------------------------------------------------------------------------
# Seas: provider abstraction. Each sea owns a registered name (gomer,
# loki, vast_main, ...) and a `type` selecting the implementation.
# Marina dispatches host_create / host_destroy / sea_search / etc. by
# the `sea` argument of the MCP call.
# --------------------------------------------------------------------------

# Local Docker on this machine. `docker_context = "default"` uses the
# normal Docker Desktop / dockerd. Replace with "gomer" for a remote
# context, "loki" for another local context, etc.
[seas.local]
type = "docker_sea"
docker_context = "default"
gpu_model = "none"
gpu_count = 0
vram_gb = 0
fp64_native = false
cpu_ghz = 4.0
cpu_cores = 8
ram_gb = 16
disk_gb = 200
# reliability defaults to 1.0 (owner-attested). Override to 0.9 if your
# box is flaky and you want it filtered out of `dft_paper_grade`.
# reliability = 1.0

# Remote Docker on the gomer GPU box (set up via `docker context create gomer`).
# [seas.gomer]
# type = "docker_sea"
# docker_context = "gomer"
# gpu_model = "RTX 4070"
# gpu_count = 1
# vram_gb = 12
# fp64_native = false       # Ada Lovelace consumer cards: no native FP64
# cpu_ghz = 5.7
# cpu_cores = 8
# ram_gb = 32
# disk_gb = 500

# Vast.ai marketplace: search / recommend / create / destroy through the
# `vastai` CLI. Marina never stores the API key in plaintext — it reads it
# from the named environment variable of the marina process at startup.
# [seas.vast]
# type = "vast_sea"
#
# # Env var holding the Vast.ai API key (default: VAST_API_KEY). Set it in
# # your shell / OS user environment or a gitignored `.env` next to this file
# # (loaded at startup), never in this file in plaintext.
# api_key_env = "VAST_API_KEY"
#
# # Path to the vastai CLI. Default "vastai" relies on PATH; pin the full path
# # if the marina process PATH omits the per-user Python Scripts dir (otherwise
# # the call fails/wedges). Single-quoted = literal, so no backslash escaping.
# # vastai_bin = 'C:\Users\me\AppData\Roaming\Python\Python313\Scripts\vastai.exe'
# # cmd_timeout_s = 45.0   # hard ceiling per vastai call (avoids MCP hangs)
#
# # Marina owns its own SSH identity locally (replaces the old skypilot relay
# # that held keys for every provider). Needed only for create()/attach;
# # search / list / status / balance work without it. Paths support ~ (home).
# # Generate one with:  ssh-keygen -t ed25519 -f ~/.ssh/id_vast -N ""
# # Leave both unset to instead rely on keys already attached to your account.
# ssh_key_path = "~/.ssh/id_vast"
# # ssh_pubkey_path = "~/.ssh/id_vast.pub"   # default: <ssh_key_path>.pub
# # ssh_user = "root"                         # default: root
# # container_grpc_port = 50051               # Lotsman port inside the box
