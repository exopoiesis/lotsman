syntax = "proto3";

package lotsman.v1;

// Lotsman service is the in-container daemon RPC contract.
// Marina is the only expected client; gRPC over SSH-forwarded UDS.
service LotsmanService {
  // Run launches a script under the daemon's supervision and
  // returns a jobId of the form `<hostId>/<ulid26>`.
  rpc Run(RunRequest) returns (RunResponse);

  // Status returns the current lifecycle state of a known job.
  // Returns NOT_FOUND if jobId is unknown.
  rpc Status(StatusRequest) returns (StatusResponse);

  // Kill terminates a running job: SIGTERM, wait grace_sec, then SIGKILL.
  // Idempotent on already-terminal jobs.
  // Returns NOT_FOUND if jobId is unknown.
  rpc Kill(KillRequest) returns (KillResponse);

  // Logs returns a snapshot of stdout/stderr for a job.
  // Use TailFollow for live streaming.
  // Returns NOT_FOUND if jobId is unknown.
  rpc Logs(LogsRequest) returns (LogsResponse);

  // TailFollow streams new stdout/stderr bytes as the job produces them,
  // ending with a chunk where job_terminal=true once the job exits.
  // Server-streaming RPC.
  rpc TailFollow(TailFollowRequest) returns (stream LogChunk);

  // Whoami returns the daemon's self-description: which tool image it lives
  // in, defaults baked into manifest.toml, known pitfalls. Lets Marina probe
  // a freshly-spawned host without out-of-band knowledge.
  rpc Whoami(WhoamiRequest) returns (WhoamiResponse);

  // Events is a server-streaming RPC over watchdog hits + (later) state
  // transitions. Setting `job_id` empty subscribes to all jobs on this
  // Lotsman; `since_unix_ms` replays past events from history (0 = live only).
  // The stream stays open until the client cancels.
  rpc Events(EventsRequest) returns (stream Event);

  // WatchdogList returns the set of watchdogs currently attached to a job
  // (defaults from manifest plus any extras passed at Run-time), with
  // their fired-once status. Returns NOT_FOUND if jobId is unknown.
  rpc WatchdogList(WatchdogListRequest) returns (WatchdogListResponse);

  // WatchdogHistory returns past fired events for a job — what crossed
  // a threshold and when. Returns NOT_FOUND if jobId is unknown.
  rpc WatchdogHistory(WatchdogHistoryRequest) returns (WatchdogHistoryResponse);
}

enum JobState {
  JOB_STATE_UNSPECIFIED = 0;
  PENDING = 1;
  RUNNING = 2;
  DONE = 3;
  FAILED = 4;
  KILLED = 5;
  ORPHANED = 6;
}

message RunRequest {
  string script = 1;
  optional string name = 2;
  optional string wd = 3;
  map<string, string> env = 4;
  // NOTE: singleton_key dropped (KISS, 2026-05-05) — one running job per
  // Lotsman is enforced; concurrent jobs not supported until needed.
}

message RunResponse {
  string job_id = 1;
  JobState state = 2;
}

message StatusRequest {
  string job_id = 1;
}

message StatusResponse {
  string job_id = 1;
  JobState state = 2;
  optional int32 exit_code = 3;
  optional int64 started_at_unix_ms = 4;
  optional int64 finished_at_unix_ms = 5;
}

message KillRequest {
  string job_id = 1;
  optional float grace_sec = 2;  // SIGTERM wait before SIGKILL; default 10
  optional bool force = 3;       // skip SIGTERM, go straight to SIGKILL
}

message KillResponse {
  string job_id = 1;
  bool killed = 2;               // true if a running process was actually terminated
  JobState state = 3;            // final state (KILLED, DONE if already done, etc.)
  optional int32 exit_code = 4;
}

message LogsRequest {
  string job_id = 1;
  // If set, return only the last N lines (per stream).
  optional uint32 tail_lines = 2;
  // If true, include stderr as well (default: stdout only).
  bool include_stderr = 3;
}

message LogsResponse {
  string job_id = 1;
  bytes stdout = 2;
  bytes stderr = 3;  // empty unless include_stderr=true
  // Number of bytes available in the source files at read time
  // (so caller can detect "more was added since")
  uint64 stdout_total_bytes = 4;
  uint64 stderr_total_bytes = 5;
}

message TailFollowRequest {
  string job_id = 1;
  bool include_stderr = 2;
  // Resume streaming from these byte offsets (for client reconnect)
  optional uint64 from_offset_stdout = 3;
  optional uint64 from_offset_stderr = 4;
}

message LogChunk {
  bytes stdout = 1;
  bytes stderr = 2;
  // Byte offset after this chunk's contents (caller can resume from here)
  uint64 stdout_offset_after = 3;
  uint64 stderr_offset_after = 4;
  // True iff the job has reached a terminal state (DONE/FAILED/KILLED)
  bool job_terminal = 5;
  JobState state = 6;
}

message WhoamiRequest {}

message WhoamiResponse {
  string lotsman_version = 1;
  // Identity from manifest.toml
  string tool = 2;             // "qe", "cp2k", ... ("" if no manifest)
  string tool_version = 3;
  string image = 4;            // e.g. "infra-qe-gpu"
  string image_tag = 5;        // e.g. "server"
  // Defaults baked into manifest
  uint32 default_omp = 6;
  uint32 default_npool = 7;
  bool mpirun_required = 8;
  // Free-form pitfall reminders ("QE GPU silent crash without mpirun", ...)
  repeated string known_pitfalls = 9;
}

// ---- watchdogs / events ----

message Event {
  // Owning job; "" only used in EventsRequest, never on the wire returned
  // from the server (each yielded Event always names its job).
  string job_id = 1;
  // For watchdog events: the check name ("disk_low", "gpu_idle", ...).
  string watchdog_name = 2;
  // Discriminator. M2-B-2 ships only "watchdog_fired"; "state_change" is
  // reserved for when we wire job lifecycle transitions in M2-B-3.
  string event_type = 3;
  int64 unix_ms = 4;
  string detail = 5;
  // "notify" | "kill" | "checkpoint"
  string severity = 6;
  // Structured payload; check-specific keys (e.g. "free_gb", "exit_code").
  map<string, string> data = 7;
}

message EventsRequest {
  // Empty subscribes across all jobs on this Lotsman.
  string job_id = 1;
  // 0 = live only; otherwise replay history from this wall-time first.
  int64 since_unix_ms = 2;
}

message Watchdog {
  string name = 1;
  bool fired = 2;
  // "notify" by default; "kill" / "checkpoint" reserved for M3.
  string action = 3;
  double interval_sec = 4;
}

message WatchdogListRequest {
  string job_id = 1;
}

message WatchdogListResponse {
  string job_id = 1;
  repeated Watchdog watchdogs = 2;
}

message WatchdogHistoryRequest {
  string job_id = 1;
  int64 since_unix_ms = 2;
}

message WatchdogHistoryResponse {
  string job_id = 1;
  repeated Event events = 2;
}
